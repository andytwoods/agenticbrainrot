"build_settings":
  "build_image": "dockerfile"
  "environment_variables":
    - "name": "DATABASE_URL"
      "from_database":
        "name": "postgres"
        "property": "private_connection_url"
    - "name": "REDIS_URL"
      "from_database":
        "name": "redis"
        "property": "private_connection_url"
    - "name": "DJANGO_SECRET_KEY"
      "value": "c-1d*dycf0hz7xm*u(0j)n-n2v&pr$mn4+j5bj2nwbpj+_0%=7"
    - "name": "DJANGO_ADMIN_URL"
      "value": "banana/"
    - "name": "ROLLBAR_ACCESS_TOKEN"
      "value": "6db97e31b6bd4058aea97b6b5a9d6a12"
  "dockerfile_path": "Dockerfile"
  "dockerfile_context_path": ""
  "container_port": 8000
"services":
  "huey":
    "scale": 1
    "command": "python manage.py run_huey"
  "release":
    "command": "bash release.sh"
  "run":
    "scale": 1
    "command": "bash run.sh"
"databases":
  "redis":
    "type": "redis_8"
  "postgres":
    "type": "postgresql_18"
